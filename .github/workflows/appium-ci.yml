name: Mobile E2E Tests (Appium)

on:
  push:
    branches: [ main, master, dev, development ]
  pull_request:
    branches: [ main, master, dev, development ]

jobs:
  mobile-tests:
    name: Run Android Appium Tests
    runs-on: macos-latest # Required for hardware acceleration for Android emulators

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium Dependencies
        working-directory: appium-tests
        run: |
          npm install
          npx appium driver install uiautomator2

      - name: Build Android APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Start Appium Server
        working-directory: appium-tests
        run: npx appium &

      - name: Run Android Emulator and Execute Tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "Emulator started successfully. Running tests..."
            export APK_PATH="${GITHUB_WORKSPACE}/app/build/outputs/apk/debug/app-debug.apk"
            cd appium-tests
            npm test

      - name: Upload Excel Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report
          path: appium-tests/test-report.xlsx
          if-no-files-found: warn
