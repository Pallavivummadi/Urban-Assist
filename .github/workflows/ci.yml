name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev, development ]
  pull_request:
    branches: [ main, master, dev, development ]

jobs:
  lint-and-build:
    name: Lint & Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'city-flow-assist-main/package.json'

      - name: Install Dependencies
        working-directory: city-flow-assist-main
        run: npm install

      - name: Run Linting
        working-directory: city-flow-assist-main
        run: npm run lint

      - name: Build Project
        working-directory: city-flow-assist-main
        run: npm run build
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || 'zicbsxcbcsrblszuppbb' }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_bUk1f0B0TGXwmROeMePHfw_rwHyx9Pl' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://zicbsxcbcsrblszuppbb.supabase.co' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'zicbsxcbcsrblszuppbb' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_bUk1f0B0TGXwmROeMePHfw_rwHyx9Pl' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://zicbsxcbcsrblszuppbb.supabase.co' }}
          VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_BROWSER_KEY: ${{ secrets.VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_BROWSER_KEY || 'AIzaSyBmvJph4LmrbtW7skeczzpBIyb9WWzFKo4' }}
          VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_TRACKING_ID: ${{ secrets.VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_TRACKING_ID || '566b6895293055817bb4c582651f4064' }}

  e2e-tests:
    name: Run E2E Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install App Dependencies
        working-directory: city-flow-assist-main
        run: npm install

      - name: Install Test Dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Start App Server in Background
        working-directory: city-flow-assist-main
        run: npm run dev &
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || 'zicbsxcbcsrblszuppbb' }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_bUk1f0B0TGXwmROeMePHfw_rwHyx9Pl' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://zicbsxcbcsrblszuppbb.supabase.co' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'zicbsxcbcsrblszuppbb' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_bUk1f0B0TGXwmROeMePHfw_rwHyx9Pl' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://zicbsxcbcsrblszuppbb.supabase.co' }}
          VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_BROWSER_KEY: ${{ secrets.VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_BROWSER_KEY || 'AIzaSyBmvJph4LmrbtW7skeczzpBIyb9WWzFKo4' }}
          VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_TRACKING_ID: ${{ secrets.VITE_LOVABLE_CONNECTOR_GOOGLE_MAPS_TRACKING_ID || '566b6895293055817bb4c582651f4064' }}

      - name: Wait for App to be Ready
        run: npx wait-on http://localhost:8080 --timeout 60000

      - name: Run E2E Selenium Tests
        working-directory: selenium-tests
        run: npm test

      - name: Upload Excel Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: selenium-tests/test-report.xlsx
          if-no-files-found: warn
