name: E2E Pipeline CI

on:
  push:
    branches: [ main, master, dev, development ]
  pull_request:
    branches: [ main, master, dev, development ]

permissions:
  contents: write

jobs:
  website_tests:
    name: Selenium — Website Tests (450)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Execute Website Tests
        working-directory: selenium-tests
        run: node run-job-tests.js --job=website

      - name: Upload Website Results
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: |
            selenium-tests/results/results-website.json
            selenium-tests/results/selenium-web-report.xlsx
          retention-days: 1

  android_tests:
    name: Appium — Android Tests (450)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Execute Android Tests
        working-directory: selenium-tests
        run: node run-job-tests.js --job=android

      - name: Upload Android Results
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: |
            selenium-tests/results/results-android.json
            selenium-tests/results/appium-android-report.xlsx
          retention-days: 1

  api_tests:
    name: Unit Tests — API (450)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Execute API Tests
        working-directory: selenium-tests
        run: node run-job-tests.js --job=api

      - name: Upload API Results
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            selenium-tests/results/results-api.json
            selenium-tests/results/unit-test-report.xlsx
          retention-days: 1

  validation_tests:
    name: Validation Tests (450)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Execute Validation Tests
        working-directory: selenium-tests
        run: node run-job-tests.js --job=validation

      - name: Upload Validation Results
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-report
          path: |
            selenium-tests/results/results-validation.json
            selenium-tests/results/validation-test-report.xlsx
          retention-days: 1

  deployment_tests:
    name: Deployment Status (450)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Execute Deployment Tests
        working-directory: selenium-tests
        run: node run-job-tests.js --job=deployment

      - name: Upload Deployment Results
        uses: actions/upload-artifact@v4
        with:
          name: deployment-test-report
          path: |
            selenium-tests/results/results-deployment.json
            selenium-tests/results/deployment-test-report.xlsx
          retention-days: 1

  performance_tests:
    name: Load Testing — Performance (450)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Execute Performance Tests
        working-directory: selenium-tests
        run: node run-job-tests.js --job=performance

      - name: Upload Performance Results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: |
            selenium-tests/results/results-performance.json
            selenium-tests/results/load-test-report.xlsx
          retention-days: 1

  compile_and_deploy:
    name: Compile Master Report & Deploy
    needs: [website_tests, android_tests, api_tests, validation_tests, deployment_tests, performance_tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: selenium-tests
        run: npm install

      - name: Ensure Results Folder Exists
        run: mkdir -p selenium-tests/results

      - name: Download Website Results
        uses: actions/download-artifact@v4
        with:
          name: selenium-web-report
          path: selenium-tests/results

      - name: Download Android Results
        uses: actions/download-artifact@v4
        with:
          name: appium-android-report
          path: selenium-tests/results

      - name: Download API Results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-report
          path: selenium-tests/results

      - name: Download Validation Results
        uses: actions/download-artifact@v4
        with:
          name: validation-test-report
          path: selenium-tests/results

      - name: Download Deployment Results
        uses: actions/download-artifact@v4
        with:
          name: deployment-test-report
          path: selenium-tests/results

      - name: Download Performance Results
        uses: actions/download-artifact@v4
        with:
          name: load-test-report
          path: selenium-tests/results

      - name: Run Master Compile Report Script
        run: node selenium-tests/compile-master-report.js

      - name: Upload Full E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: dist-report
          retention-days: 7
